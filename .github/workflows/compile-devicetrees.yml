name: Many devicetrees

on:
  workflow_call:
    inputs:
      compiler:
        type: string
        default: "gcc"
      archs:
        required: true
        type: string
      dts_files:
        required: true
        type: string
    outputs:
      fail:
        value: ${{ jobs.build.outputs.fail }}
      warn:
        value: ${{ jobs.build.outputs.warn }}

env:
  run_id: ${{ github.run_id }}

jobs:
  build:
    timeout-minutes: 7200
    runs-on: ${{ fromJSON(vars.RUNNER) || 'ubuntu-latest' }}

    env:
      GCC_VERSION: 13

    outputs:
      fail: ${{ steps.assert.outputs.fail }}
      warn: ${{ steps.assert.outputs.warn }}

    steps:
    - uses: analogdevicesinc/doctools/checkout@action

    - name: Get sources
      run: |
        file=$(echo "${{ github.workflow_ref }}" | cut -d'/' -f3- | cut -d'@' -f1)
        workflow_ref=$(awk '
          $0 ~ "uses:" && $0 ~ job".yml" {
            sub(/^[[:space:]]*uses:[[:space:]]*/, "", $0);
            print $0;
            exit
          }
        ' "$file")
        echo $workflow_ref

        org_repo="$(echo "$workflow_ref" | cut -d'/' -f1-2)"
        ref="$(echo "$workflow_ref" | cut -d'@' -f2)"

        get_file () {
          echo https://raw.githubusercontent.com/$org_repo/$ref/$1
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -o $1 \
              https://raw.githubusercontent.com/$org_repo/$ref/$1
        }

        mkdir -p ci
        get_file ci/build.sh
        get_file ci/runner_env.sh

    - name: Prepare env
      run: |
        if [[ "${{ inputs.compiler }}" == "gcc" ]]; then
          echo "CXX=gcc-$GCC_VERSION" >> $GITHUB_ENV
          echo "compiler_version=$GCC_VERSION" >> $GITHUB_ENV
        else
          echo "::error ::Compiler '${{ inputs.compiler }}' is not supported, valid is 'gcc'."
          exit 1
        fi
        echo "ARCHS=${{ inputs.archs }}" >> $GITHUB_ENV
        echo "DTS_FILES=${{ inputs.dts_files }}" >> $GITHUB_ENV

        kversion=$(grep -E '^(VERSION|PATCHLEVEL|SUBLEVEL|EXTRAVERSION)' ./Makefile | sed -E 's/.*= *//g' | tr '\n' ' ' | sed -E 's/([0-9]+) ([0-9]+) ([0-9]+) (.*) /\1.\2.\3\4+/')
        echo "KBUILD_OUTPUT=$(mktemp -d -t linux.$kversion.build.XXX)" >> $GITHUB_ENV

    - name: Compile many devicetrees
      run: |
        source ./ci/build.sh
        compile_many_devicetrees

    - name: Prepare dist
      run: |
        kversion=$(cat "$KBUILD_OUTPUT/include/config/kernel.release")

        dist=$(mktemp -d -t linux.$kversion.dist.XXX)
        echo "DIST=$dist" >> $GITHUB_ENV

        mkdir -p "$dist/dtb"
        pushd "$KBUILD_OUTPUT"
        find . -type f \( -name "*.dtb" -o -name "*.dtbo" \) | \
          xargs -I % cp --parents % "$dist/dtb"
        popd

        echo "kernel_release=$kversion" > "$dist/context.txt"
        echo "compiler_name=${{ inputs.compiler }}" >> "$dist/context.txt"
        echo "compiler_version=${{ env.compiler_version }}" >> "$dist/context.txt"
        echo "git_ref=${{ github.ref }}" >> "$dist/context.txt"
        echo "git_sha=${{ github.sha }}" >> "$dist/context.txt"
        echo "git_sha_at=$(git --no-pager log ${{ github.sha }} -1 --pretty=format:%at)" >> "$dist/context.txt"
        echo "git_sha_ct=$(git --no-pager log ${{ github.sha }} -1 --pretty=format:%ct)" >> "$dist/context.txt"

    - name: Store the distribution packages
      uses: actions/upload-artifact@v6
      with:
        name: dtb-${{ inputs.compiler }}
        path: ${{ env.DIST }}

    - name: Assert
      id: assert
      run: |
        source ./ci/runner_env.sh
        export_labels

    - name: Clean-up
      if: ${{ always() }}
      run: |
        [ -d "$KBUILD_OUTPUT" ] && rm -rf "$KBUILD_OUTPUT" || true
        [ -d "$DIST" ] && rm -rf "$DIST" || true
