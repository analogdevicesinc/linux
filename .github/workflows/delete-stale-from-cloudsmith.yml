name: Delete stale artifacts from cloudsmith

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Number of days for branch packages'
        type: number
        default: 0
      pr:
        description: 'Number of days for pull request packages'
        type: number
        default: 90
  workflow_call:
    inputs:
      branch:
        type: string
        default: 0
      pr:
        type: string
        default: 90
    secrets:
      CLOUDSMITH_SERVICE_SLUG:
        required: false
      CLOUDSMITH_API_KEY:
        required: false

jobs:
  delete-stale-from-cloudsmith:
    runs-on: ubuntu-slim
    permissions:
      id-token: write
      contents: read
      pull-requests: read

    steps:
    - name: Get sources
      run: |
        get_file () {
          echo https://raw.githubusercontent.com/analogdevicesinc/linux/ci/$1
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -o $1 \
              https://raw.githubusercontent.com/analogdevicesinc/linux/ci/$1
        }

        mkdir -p ci
        get_file ci/lib.sh
        get_file ci/cloudsmith-delete-stale.sh

    - name: Setup Cloudsmith API Key
      env:
        CLOUDSMITH_SERVICE_SLUG: ${{ secrets.CLOUDSMITH_SERVICE_SLUG }}
      if: ${{ env.CLOUDSMITH_SERVICE_SLUG != '' && env.CLOUDSMITH_SERVICE_SLUG == ' ' }}
      run: |
        CLOUDSMITH_API_KEY=$(echo "${{ secrets.CLOUDSMITH_API_KEY }}" | xargs)
        echo "CLOUDSMITH_API_KEY=$CLOUDSMITH_API_KEY" >> "$GITHUB_ENV"

    - name: Use Cloudsmith OIDC
      uses: cloudsmith-io/cloudsmith-cli-action@v1.0.5
      env:
        CLOUDSMITH_SERVICE_SLUG: ${{ secrets.CLOUDSMITH_SERVICE_SLUG }}
      if: ${{ env.CLOUDSMITH_SERVICE_SLUG != '' && env.CLOUDSMITH_SERVICE_SLUG != ' ' }}
      with:
        oidc-namespace: ${{ vars.CLOUDSMITH_NAMESPACE }}
        oidc-service-slug: ${{ secrets.CLOUDSMITH_SERVICE_SLUG }}
        oidc-auth-only: 'true'

    - name: Delete stale packages
      if: ${{ env.CLOUDSMITH_API_KEY != '' }}
      run: |
        # Delete stale packages
        [[ "${{ runner.debug }}" == "1" ]] && set -x
        source ci/cloudsmith-delete-stale.sh

        cs-delete-stale "${{ env.CLOUDSMITH_API_KEY }}" \
                        "${{ vars.CLOUDSMITH_NAMESPACE }}/${{ vars.CLOUDSMITH_REPOSITORY }}" \
                        "${{ github.token }}" \
                        "${{ github.repository }}" \
                        "${{ inputs.branch }}" \
                        "${{ inputs.pr }}"
