name: GMSL Kernel Build

on:
  push:
    paths-ignore:
      - '.github/**'
    branches:
      - 'gmsl/rpi-6.13.y'
  workflow_dispatch:

env:
  NUM_JOBS: 6

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: bcm2711_adi_gmsl
            defconfig: bcm2711_adi_gmsl_defconfig
            kernel: kernel8

          - name: bcm2712_adi_gmsl
            defconfig: bcm2712_adi_gmsl_defconfig
            kernel: kernel_2712

    steps:
    - name: Update install
      run: sudo apt-get update

    - name: Install toolchain
      run: sudo apt-get install -y gcc-aarch64-linux-gnu flex bison libssl-dev bc libelf-dev
      timeout-minutes: 5

    - uses: actions/checkout@v4
      with:
        fetch-depth: 1
        clean: true

    - name: Build kernel ${{ matrix.name }}
      run: |
        mkdir ${{ github.workspace }}/build
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-

        make O=${{ github.workspace }}/build ${{ matrix.defconfig }}
        make O=${{ github.workspace }}/build -j ${{ env.NUM_JOBS }} Image modules dtbs

        mkdir -p ${{ github.workspace }}/install/boot/overlays
        cp ${{ github.workspace }}/build/arch/arm64/boot/dts/broadcom/*.dtb \
           ${{ github.workspace }}/install/boot/
        cp ${{ github.workspace }}/build/arch/arm64/boot/dts/overlays/*.dtb* \
           ${{ github.workspace }}/install/boot/overlays/
        cp ${{ github.workspace }}/arch/arm64/boot/dts/overlays/README \
           ${{ github.workspace }}/install/boot/overlays/ || true
        cp ${{ github.workspace }}/build/arch/arm64/boot/Image \
           ${{ github.workspace }}/install/boot/${{ matrix.kernel }}.img

        make O=${{ github.workspace }}/build \
             INSTALL_MOD_PATH=${{ github.workspace }}/install/modules \
             modules_install

        find ${{ github.workspace }}/install/modules/lib/modules/ \
             -maxdepth 2 \( -name build -o -name source \) -delete

    - name: Download rpi boot files
      run: |
        cd ${{ github.workspace }}/install/boot/
        wget --progress=bar:force:noscroll "https://swdownloads.analog.com/cse/linux_rpi/gmsl/boot-files/rpi-boot-files.tar.gz"
        tar -zxvf rpi-boot-files.tar.gz
        mv boot-files/* .
        rm -rf boot-files
        rm rpi-boot-files.tar.gz

    - name: Upload boot files
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}_boot
        path: ${{ github.workspace }}/install/boot/
        retention-days: 30

    - name: Upload modules
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}_modules
        path: ${{ github.workspace }}/install/modules/lib/modules/
        retention-days: 30

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download RPi4 boot files
      uses: actions/download-artifact@v4
      with:
        name: bcm2711_adi_gmsl_boot
        path: combined/boot/

    - name: Download RPi5 boot files
      uses: actions/download-artifact@v4
      with:
        name: bcm2712_adi_gmsl_boot
        path: combined/boot/

    - name: Download RPi4 modules
      uses: actions/download-artifact@v4
      with:
        name: bcm2711_adi_gmsl_modules
        path: combined/modules/

    - name: Download RPi5 modules
      uses: actions/download-artifact@v4
      with:
        name: bcm2712_adi_gmsl_modules
        path: combined/modules/

    - name: Create combined boot tarball
      run: |
        cd combined/boot
        tar -czf ${{ github.workspace }}/rpi_latest_boot_64bit.tar.gz .

    - name: Create combined modules tarball
      run: |
        cd combined/modules
        tar -czf ${{ github.workspace }}/rpi_modules_64bit.tar.gz .

    - name: Upload combined boot tarball
      uses: actions/upload-artifact@v4
      with:
        name: rpi_boot_64bit
        path: ${{ github.workspace }}/rpi_latest_boot_64bit.tar.gz
        retention-days: 30

    - name: Upload combined modules tarball
      uses: actions/upload-artifact@v4
      with:
        name: rpi_modules_64bit
        path: ${{ github.workspace }}/rpi_modules_64bit.tar.gz
        retention-days: 30

    - name: Trigger adi-kuiper-gen build
      run: |
        curl --fail-with-body -s -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.CROSS_REPO_PAT }}" \
          https://api.github.com/repos/iristeiu06/adi-kuiper-gen/actions/workflows/gmsl-image-build.yml/dispatches \
          -d '{
            "ref": "gmsl-rpi-6.13.y",
            "inputs": {
              "linux_run_id": "${{ github.run_id }}"
            }
          }'
