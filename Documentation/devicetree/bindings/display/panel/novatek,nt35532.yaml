%YAML 1.2
---
$id: http://devicetree.org/schemas/display/panel/novatek,nt35532.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Novatek NT35532-based DSI display panels

maintainers:
  - Cristian Cozzolino <cristian_ci@protonmail.com>

allOf:
  - $ref: panel-common.yaml#

properties:
  compatible:
    items:
      - enum:
          - flipkart,rimob-panel-nt35532-cs
      - const: novatek,nt35532

  reg:
    maxItems: 1

  backlight: true
  reset-gpios: true

  avdd-supply:
    description: positive boost supply regulator

  avee-supply:
    description: negative boost supply regulator

  vci-supply:
    description: regulator that supplies the analog voltage

  vddam-supply:
    description: power supply for MIPI interface

  vddi-supply:
    description: regulator that supplies the I/O voltage

  port: true

required:
  - compatible
  - reg
  - reset-gpios
  - vddi-supply
  - port

additionalProperties: false

examples:
  - |
    #include <dt-bindings/gpio/gpio.h>

    dsi {
        #address-cells = <1>;
        #size-cells = <0>;

        panel@0 {
            compatible = "flipkart,rimob-panel-nt35532-cs", "novatek,nt35532";
            reg = <0>;

            backlight = <&pmi8950_wled>;
            reset-gpios = <&tlmm 61 GPIO_ACTIVE_LOW>;
            avdd-supply = <&lab>;
            avee-supply = <&ibb>;
            vci-supply = <&pm8953_l17>;
            vddi-supply = <&pm8953_l6>;

            port {
                panel_in: endpoint {
                    remote-endpoint = <&dsi0_out>;
                };
            };
        };
    };
...
