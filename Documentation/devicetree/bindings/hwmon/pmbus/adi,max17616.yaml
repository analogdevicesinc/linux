%YAML 1.2
---
$id: http://devicetree.org/schemas/hwmon/pmbus/adi,max17616.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Analog Devices MAX17616/MAX17616A

maintainers:
  - Kim Seer Paller <kimseer.paller@analog.com>

description: |
  The MAX17616/MAX17616A is a 3V to 80V, 7A current-limiter with overvoltage,
  surge, undervoltage, reverse polarity, and loss of ground protection. It
  features a PMBus interface for configuration and monitoring.
  Datasheet:
    https://www.analog.com/media/en/technical-documentation/data-sheets/max17616-max17616a.pdf

properties:
  compatible:
    enum:
      - adi,max17616
      - adi,max17616a

  reg:
    maxItems: 1

  vcc-supply: true

required:
  - compatible
  - reg
  - vcc-supply

additionalProperties: false

examples:
  - |
    i2c {
        #address-cells = <1>;
        #size-cells = <0>;

        hwmon@16 {
            compatible = "adi,max17616";
            reg = <0x16>;
            vcc-supply = <&vcc>;
        };
    };
...
