%YAML 1.2
---
$id: http://devicetree.org/schemas/bindings/iio/adc/adi,ade9000.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Analog Devices ADE9000 High Performance, Polyphase Energy Metering driver

maintainers:
  - Antoniu Miclaus <antoniu.miclaus@analog.com>

description: |
  The ADE9000 s a highly accurate, fully integrated, multiphase energy and power
  quality monitoring device. Superior analog performance and a digital signal
  processing (DSP) core enable accurate energy monitoring over a wide dynamic
  range. An integrated high end reference ensures low drift over temperature
  with a combined drift of less than ±25 ppm/°C maximum for the entire channel
  including a programmable gain amplifier (PGA) and an analog-to- digital
  converter (ADC).

  https://www.analog.com/media/en/technical-documentation/data-sheets/ADE9000.pdf

$ref: /schemas/spi/spi-peripheral-props.yaml#

properties:
  compatible:
    enum:
      - adi,ade9000

  reg:
    maxItems: 1

  '#address-cells':
    const: 1

  '#size-cells':
    const: 0

  spi-max-frequency:
    maximum: 20000000

  interrupts:
    maxItems: 2

  interrupt-names:
    items:
      - const: irq0
      - const: irq1

  reset-gpios:
    description: |
      Must be the device tree identifier of the RESET pin. As the line is
      active low, it should be marked GPIO_ACTIVE_LOW.
    maxItems: 1

  vdd-supply: true

  vref-supply: true

patternProperties:
  "^channel@[0-2]$":
    $ref: /schemas/iio/adc/adc.yaml#
    type: object

    properties:
      reg:
        description: The channel number (0-2 for phases A, B, C)
        minimum: 0
        maximum: 2

    required:
      - reg

    additionalProperties: false

required:
  - compatible
  - reg
  - reset-gpios
  - interrupts
  - interrupt-names
  - vdd-supply

allOf:
  - $ref: /schemas/spi/spi-peripheral-props.yaml#

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/gpio/gpio.h>
    #include <dt-bindings/interrupt-controller/irq.h>

    spi {
      #address-cells = <1>;
      #size-cells = <0>;

      adc@0 {
          compatible = "adi,ade9000";
          reg = <0>;
          spi-max-frequency = <7000000>;

          #address-cells = <1>;
          #size-cells = <0>;
          reset-gpios = <&gpio 4 GPIO_ACTIVE_LOW>;
          interrupts = <2 IRQ_TYPE_EDGE_FALLING>, <3 IRQ_TYPE_EDGE_FALLING>;
          interrupt-names = "irq0", "irq1";
          interrupt-parent = <&gpio>;
          vdd-supply = <&vdd_reg>;

          channel@0 {
            reg = <0>;
          };
          channel@1 {
            reg = <1>;
          };
          channel@2 {
            reg = <2>;
          };
      };
    };
