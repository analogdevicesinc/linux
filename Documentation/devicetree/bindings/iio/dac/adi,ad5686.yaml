%YAML 1.2
---
$id: http://devicetree.org/schemas/iio/dac/adi,ad5686.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Analog Devices AD5360 and similar SPI DACs

maintainers:
  - Michael Hennerich <michael.hennerich@analog.com>
  - Jonathan Cameron <jic23@kernel.org>

properties:
  compatible:
    enum:
      - adi,ad5310r
      - adi,ad5672r
      - adi,ad5674r
      - adi,ad5676
      - adi,ad5676r
      - adi,ad5679r
      - adi,ad5681r
      - adi,ad5682r
      - adi,ad5683
      - adi,ad5683r
      - adi,ad5684
      - adi,ad5684r
      - adi,ad5685r
      - adi,ad5686
      - adi,ad5686r

  reg:
    maxItems: 1

  vcc-supply:
    description: If not supplied the internal reference is used.

  reset-gpios:
    description: Active-low RESET pin to reset the device.
    maxItems: 1

  ldac-gpios:
    description:
      Active-low LDAC pin used to asynchronously update the DAC channels.
    maxItems: 1

  gain-gpios:
    description:
      GAIN pin that sets a multiplier for the DAC output voltage. When high,
      the DAC output voltage is multiplied by 2, otherwise it is unchanged.
    maxItems: 1

required:
  - compatible
  - reg

allOf:
  - $ref: /schemas/spi/spi-peripheral-props.yaml#
  - if:
      properties:
        compatible:
          contains:
            anyOf:
              - const: adi,ad5310r
              - const: adi,ad5681r
              - const: adi,ad5682r
              - const: adi,ad5683
              - const: adi,ad5683r
    then:
      properties:
        gain-gpios: false

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/gpio/gpio.h>
    spi {
        #address-cells = <1>;
        #size-cells = <0>;
        dac@0 {
            reg = <0>;
            compatible = "adi,ad5310r";
            vcc-supply = <&dac_vref0>;
            reset-gpios = <&gpio0 0 GPIO_ACTIVE_LOW>;
            ldac-gpios = <&gpio0 1 GPIO_ACTIVE_LOW>;
        };
    };
...
