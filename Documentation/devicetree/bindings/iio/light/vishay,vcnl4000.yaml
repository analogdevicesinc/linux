%YAML 1.2
---
$id: http://devicetree.org/schemas/iio/light/vishay,vcnl4000.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: VISHAY VCNL4000 ambient light and proximity sensor

maintainers:
  - Peter Meerwald <pmeerw@pmeerw.net>

description: |
  Ambient light sensing with proximity detection over an i2c
  interface.

allOf:
  - $ref: ../common.yaml#

properties:
  compatible:
    oneOf:
      - enum:
          - capella,cm36672p
          - vishay,vcnl4000
          - vishay,vcnl4010
          - vishay,vcnl4020
          - vishay,vcnl4040
          - vishay,vcnl4200
      - items:
          - const: capella,cm36686
          - const: vishay,vcnl4040

  interrupts:
    maxItems: 1

  vdd-supply:
    description: Regulator providing power to the "VDD" pin.

  vio-supply:
    description: Regulator providing power for pull-up of the I/O lines.
      Does not connect to the sensor directly, but is needed for the
      correct operation of the I2C and interrupt lines.

  vled-supply:
    description: Regulator providing power to the IR anode pin.

  reg:
    maxItems: 1

  proximity-near-level: true

required:
  - compatible
  - reg

additionalProperties: false

examples:
  - |
    i2c {
        #address-cells = <1>;
        #size-cells = <0>;

        light-sensor@51 {
            compatible = "vishay,vcnl4200";
            reg = <0x51>;
            proximity-near-level = <220>;
            vdd-supply = <&reg_vdd>;
            vio-supply = <&reg_vio>;
            vled-supply = <&reg_vled>;
        };
    };
...
