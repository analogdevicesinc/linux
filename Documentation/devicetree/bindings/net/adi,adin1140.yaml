%YAML 1.2
---
$id: http://devicetree.org/schemas/net/adi,adin1140.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: ADI ADIN1140 10BASE-T1S MAC-PHY

maintainers:
  - Analog Devices Inc. <linux-drivers@analog.com>

description: |
  The ADIN1140 is a low power single port 10BASE-T1S MAC-PHY
  designed for industrial Ethernet applications. It integrates
  an Ethernet PHY core with a MAC and all the associated analog
  circuitry, input and output clock buffering.

  The device implements the Open Alliance TC6 10BASE-T1x MAC-PHY
  Serial Interface specification and is compliant with the
  IEEE 802.3cg-2019 Ethernet standard for 10 Mbps single pair
  Ethernet (SPE).

  The device has a 4-wire SPI interface for communication
  between the MAC and host processor.

allOf:
  - $ref: ethernet-controller.yaml#
  - $ref: /schemas/spi/spi-peripheral-props.yaml#

properties:
  compatible:
    const: adi,adin1140

  reg:
    maxItems: 1
    description: SPI chip select number

  spi-max-frequency:
    maximum: 25000000
    description: Maximum SPI clock frequency supported by the device

  interrupts:
    maxItems: 1
    description: Interrupt from the MAC-PHY for receive data available and error conditions

  local-mac-address: true

  mac-address: true

required:
  - compatible
  - reg
  - interrupts

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/interrupt-controller/irq.h>

    spi {
        #address-cells = <1>;
        #size-cells = <0>;

        ethernet@0 {
            compatible = "adi,adin1140";
            reg = <0>;
            spi-max-frequency = <23000000>;

            interrupt-parent = <&gpio>;
            interrupts = <6 IRQ_TYPE_EDGE_FALLING>;

            local-mac-address = [ 00 11 22 33 44 55 ];
        };
    };
