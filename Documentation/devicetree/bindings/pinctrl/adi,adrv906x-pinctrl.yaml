%YAML 1.2
---
$id: http://devicetree.org/schemas/pinctrl/adi,adrv906x-pinctrl.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Analog Devices ADRV906X SoC Pinmux Controller

maintainers:
  - Woodrow Barlow <woodrow.barlow@analog.com>

description: |
  The ADRV906X SoC integrates many internal function blocks (UART, SPI, I2C,
  GPIO, among others) which can be optionally enabled by the end user. To
  conserve the number of pins and reduce overall package size, a Pinmux
  Controller is utilized. This Pinmux Controller allows for several of these
  function blocks to share a single Input/Output pin.

  The number of configurable pins, number of sources per pin, and their
  mappings is described in the referenced header file
  (include/dt-bindings/pinctrl/pinctrl-adi-adrv906x-io-pad.h).

  Pin configuration nodes represent a group of pins which can be used for a
  specific device or function. Each node specifies the pin number, source mux,
  and configuration of the pins in that group. The 'source mux' selects the
  function that connects to the specified pin, and the 'config' configures
  various pad settings such as pull-up, open drain, drive strength, etc.

  The header file provides SoC specific pin controller information such as:
    - Total configurable I/O
    - Maximum pinmux sources per pin
    - Maximum pinmux sources available
    - Pre-configured descriptive Pin IDs (which contain Pin Number and Source
      Mux) for all possible I/O configurations

  Configuration Word 32-bit Description:
    Bit(s)  Name                     Description
    31:7    unused                   N/A
    6       PULLUP_ENABLE            Setting to 1 enables pullup of selected pin,
                                     0 for pulldown
    5       PULL_ENABLEMENT          Setting to 1 enables the pull (up/down)
                                     capability of the selected pin
    4       SCHMITT_TRIGGER_ENABLE   Setting to 1 enables the schmitt trigger
                                     input capability
    3:0     DRIVE_STRENGTH           This 4-bit field specifies the drive
                                     strength (0-15) of the selected output
                                     signal

  The referenced header file also contains configuration word helper macros
  that can be utilized within the device tree descriptions.

properties:
  compatible:
    const: adi,adrv906x-pinctrl

  reg:
    maxItems: 1

patternProperties:
  '-grp$':
    type: object
    additionalProperties: false
    description:
      Pin configuration node describing a group of pins and their configuration.

    properties:
      adi,pins:
        $ref: /schemas/types.yaml#/definitions/uint32-matrix
        description: |
          Each entry consists of 3 32-bit integers representing:
            PIN_NUMBER   - The pin number
            SOURCE_MUX   - The source mux value
            CONFIG_WORD  - The configuration word

          Pre-configured Pin IDs from the header file can be used for PIN_NUMBER
          and SOURCE_MUX. Configuration word helper macros from the header can
          be used for CONFIG_WORD.
        items:
          items:
            - description: Pin number
            - description: Source mux value
            - description: Configuration word (pull settings, drive strength, etc.)

allOf:
  - $ref: pinctrl.yaml#

required:
  - compatible
  - reg

additionalProperties:
  type: object

examples:
  - |
    #include <dt-bindings/pinctrl/pinctrl-adi-adrv906x-io-pad.h>

    pinctrl0: pinctrl@20000000 {
      compatible = "adi,adrv906x-pinctrl";
      reg = <0x20000000 0x1000>;

      pinctrl_spi0: spi0-grp {
        adi,pins = <QSPI_FLASH_CLK_PIN (ADI_CONFIG_NO_PULL)
                    QSPI_FLASH_SELB_PIN (ADI_CONFIG_ENABLE_PULLUP | ADI_CONFIG_DRIVE_STRENGTH_4)
                    QSPI_FLASH_D0_PIN (ADI_CONFIG_NO_PULL | ADI_CONFIG_DRIVE_STRENGTH_4)
                    QSPI_FLASH_D1_PIN (ADI_CONFIG_NO_PULL | ADI_CONFIG_DRIVE_STRENGTH_4)
                    QSPI_FLASH_D2_PIN (ADI_CONFIG_NO_PULL | ADI_CONFIG_DRIVE_STRENGTH_4)
                    QSPI_FLASH_D3_PIN (ADI_CONFIG_NO_PULL | ADI_CONFIG_DRIVE_STRENGTH_4)
                    QSPI_FLASH_RESETN_PIN (ADI_CONFIG_ENABLE_PULLUP | ADI_CONFIG_DRIVE_STRENGTH_4)
                    QSPI_FLOW_READY_PIN (ADI_CONFIG_NO_PULL)>;
      };
    };

    spi@30000000 {
      pinctrl-names = "default";
      pinctrl-0 = <&pinctrl_spi0>;
    };

...
