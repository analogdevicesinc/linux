%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/adi,adp5055-regulator.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Analog Devices ADP5055 Triple Buck Regulator

maintainers:
  - Alexis Czezar Torreno <alexisczezar.torreno@analog.com>

description: |
  The ADP5055 combines three high performance buck regulators.
  The device enables direct connection to high input voltages
  up to 18 V with no preregulators.
  https://www.analog.com/media/en/technical-documentation/data-sheets/adp5055.pdf

allOf:
  - $ref: regulator.yaml#

properties:
  compatible:
    enum:
      - adi,adp5055

  reg:
    enum:
      - 0x70
      - 0x71

  adi,hw_en_0-gpios:
    description:
      Asserted during driver probe. Acts as the hardware enable
      for channel 0. Should be marked 0 for active low.
    maxItems: 1

  adi,hw_en_1-gpios:
    description:
      Asserted during driver probe. Acts as the hardware enable
      for channel 1. Should be marked 0 for active low.
    maxItems: 1

  adi,hw_en_2-gpios:
    description:
      Asserted during driver probe. Acts as the hardware enable
      for channel 2. Should be marked 0 for active low.
    maxItems: 1

  adi,enable-mode-sw:
    description:
      If present, configure channels to be enabled via software
      instead of hardware enable.
    type: boolean

  adi,ocp-blanking:
    description:
      If present, the over current protection
      blanking (OCP) for all channels is on.
    type: boolean

  adi,delay-power-good:
    description:
      Configures delay timer of the power good (PWRGD) pin.
      Delay is based on Tset which can be 2.6 ms or 20.8 ms.
    type: boolean

  '#address-cells':
    const: 1

  '#size-cells':
    const: 0

patternProperties:
  "^channel@([0-2])$":
    type: object
    additionalProperties: false

    properties:
      reg:
        description: The channel number representing each buck converter.
        maximum: 2

      adi,power-saving-mode-ch:
        description:
          If present, enables power saving mode for
          individual channels.
        type: boolean

      adi,output-discharge-function-ch:
        description:
          If present, enable output discharge functionality
          for individual channels.
        type: boolean

      adi,disable-delay-ch:
        description:
          A multiplier value to configure the disable delay
          for each channel. Delay = X * Tset.
        $ref: /schemas/types.yaml#/definitions/uint32
        enum: [0, 2, 4, 6, 8, 10, 12, 14]
        default: 0

      adi,enable-delay-ch:
        description:
          A multiplier value to configure the enable delay
          for each channel. Delay = X * Tset.
        $ref: /schemas/types.yaml#/definitions/uint32
        minimum: 0
        maximum: 7
        default: 0

      adi,dvs-limit-upper-ch:
        description:
          Configure the allowable upper side limit of the
          voltage output of each channel. Units in uV.
          Voltages are in 12mV steps, value is autoadjusted.
          Vout_high = Vout + DVS_upper_limit.
        $ref: /schemas/types.yaml#/definitions/uint32
        minimum: 12000
        maximum: 192000
        default: 0

      adi,dvs-limit-lower-ch:
        description:
          Configure the allowable lower side limit of the
          voltage output of each channel. Units in uV.
          Voltages are in 12mV steps, value is autoadjusted.
          Vout_low = Vout - DVS_lower_limit.
        $ref: /schemas/types.yaml#/definitions/uint32
        minimum: -190500
        maximum: -10500
        default: 0

      adi,fast-transient-ch:
        description:
          A 2-bit values to configure the fast transient
          sensitivity for each channel.
          "none"    - No fast transient.
          "3G_1.5%" - 1.5% window with 3*350uA/V
          "5G_1.5%" - 1.5% window with 5*350uA/V
          "5G_2.5%" - 2.5% window with 5*350uA/V
        enum: [none, 3G_1.5%, 5G_1.5%, 5G_2.5%]
        default: 5G_2.5%

      adi,mask-power-good-ch:
        description:
          Masks or unmasks individual channels to the external
          PWRGD hardware pin.
        type: boolean

    required:
      - reg

required:
  - compatible
  - reg

unevaluatedProperties: false

examples:
  - |
    i2c {
        #address-cells = <1>;
        #size-cells = <0>;

        regulator@70 {
            compatible = "adi,adp5055";
            reg = <0x70>;
            #address-cells = <1>;
            #size-cells = <0>;

            hw_en_0-gpios = <&gpio 17 0>;
            hw_en_1-gpios = <&gpio 18 0>;
            hw_en_2-gpios = <&gpio 19 0>;

            adi,enable-mode = <1>;
            adi,ocp-blanking;
            adi,delay-power-good;

            channel@0 {
                reg = <0>;
                adi,power-saving-mode-ch;
                adi,output-discharge-function-ch;
                adi,disable-delay-ch = <2>;
                adi,enable-delay-ch = <2>;
                adi,dvs-limit-upper-ch = <8>;
                adi,dvs-limit-lower-ch = <6>;
                adi,fast-transient-ch = <3>;
                adi,mask-power-good-ch;
            };

            channel@1 {
                reg = <1>;
                adi,power-saving-mode-ch;
                adi,output-discharge-function-ch;
                adi,disable-delay-ch = <2>;
                adi,enable-delay-ch = <2>;
                adi,dvs-limit-upper-ch = <8>;
                adi,dvs-limit-lower-ch = <6>;
                adi,fast-transient-ch = <3>;
                adi,mask-power-good-ch;
            };

            channel@2 {
                reg = <2>;
                adi,power-saving-mode-ch;
                adi,output-discharge-function-ch;
                adi,disable-delay-ch = <2>;
                adi,enable-delay-ch = <2>;
                adi,dvs-limit-upper-ch = <8>;
                adi,dvs-limit-lower-ch = <6>;
                adi,fast-transient-ch = <3>;
                adi,mask-power-good-ch;
            };
        };
    };
