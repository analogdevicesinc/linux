%YAML 1.2
---
$id: http://devicetree.org/schemas/spi/adi,spi3-peripheral-props.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Peripheral-specific properties for Analog Devices SPI3 controller driver

description:
  See spi-peripheral-props.yaml for more info.

maintainers:
  - Greg Malysa <gmalysa@alumni.stanford.edu>
  - Slawomir Kulig <slawomir.kulig@analog.com>

properties:
  adi,enable-dma:
    type: boolean
    description: |
      Use DMA for data transfers to/from SPI controller.

  adi,open-drain-mode:
    type: boolean
    description: |
      Enable ODM - Open Drain Mode for all output pins.

  adi,psse:
    type: boolean
    description: |
      Enable PSSE - Controls signalling of MODF error.

additionalProperties: true
